[graph]
all-features = true

[advisories]
version = 2
# cargo-deny removed severity-threshold; vulnerabilities are always errors.
ignore = ["RUSTSEC-2020-0168"]
unmaintained = "all"
unsound = "all"
yanked = "deny"

[licenses]
version = 2
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
skip = [
    { crate = "bitflags@=1.3.2", reason = "serialport5 still depends on nix 0.23.2 while newer host crates use bitflags 2.x" },
    { crate = "mach@=0.1.2", reason = "serialport5 still pulls an older macOS FFI stack alongside mach 0.3.2" },
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
