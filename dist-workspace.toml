[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.31.0"
packages = ["unbrk-cli"]
targets = [
  "x86_64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]
hosting = ["github"]
installers = ["shell", "powershell"]
checksum = "sha256"
unix-archive = ".tar.gz"
windows-archive = ".zip"
source-tarball = false
